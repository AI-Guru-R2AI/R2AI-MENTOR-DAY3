<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Scales of Justice Graphic -->
  <g fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" transform="translate(48, 48)">
    <!-- Base / Stand -->
    <path d="M128 350 L288 350" stroke-width="24" />
    <path d="M208 350 L208 100" stroke-width="24" />
    
    <!-- Beam -->
    <path d="M80 130 L336 130" stroke-width="24" />
    
    <!-- Left Pan -->
    <path d="M80 130 L80 230" stroke-width="16" />
    <path d="M40 230 C 40 275, 120 275, 120 230 Z" stroke-width="20" fill="rgba(255, 255, 255, 0.1)" />
    
    <!-- Right Pan -->
    <path d="M336 130 L336 230" stroke-width="16" />
    <path d="M296 230 C 296 275, 376 275, 376 230 Z" stroke-width="20" fill="rgba(255, 255, 255, 0.1)" />
    
    <!-- Balance Pivot -->
    <polygon points="208,90 192,120 224,120" fill="#ffffff" stroke="none" />
  </g>
</svg>
